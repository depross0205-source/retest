<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>動能交易日誌 v1.1</title>
<style>
/* 核心變數：確保為半形雙橫線 */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0c10; --sf: #12161f; --sf2: #1a2030; --bd: #252d3d; --bhi: #3a4560;
  --tx: #e2eaf8; --mu: #6b7a99; --gr: #00e5a0; --re: #ff4d6d; --red: #3d0012;
  --ye: #ffb830; --bl: #4d9fff; --bld: #001a3d; --ac: #7eb8ff;
  --tw: #ff6b9d; --twd: #3d0020; --te: #00d4aa; --ted: #003328; --wh: #f8faff;
  --us: #a78bfa; --usd: #1a0040;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; padding: 16px; font-size: 14px; line-height: 1.6; }
.mono { font-family: 'Courier New', monospace; }
.wrap { max-width: 960px; margin: 0 auto; }
h1 { font-size: 18px; font-weight: 700; color: var(--wh); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--tw); color: #000; font-weight: 700; }
.sub { font-size: 11px; color: var(--mu); margin-bottom: 14px; }
.card { background: var(--sf); border: 1px solid var(--bd); padding: 13px; margin-bottom: 10px; border-radius: 3px; }
.ct { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--mu); margin-bottom: 9px; display: flex; justify-content: space-between; align-items: center; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.fi { display: flex; flex-direction: column; gap: 3px; }
.fi label { font-size: 10px; color: var(--mu); font-weight: 700; text-transform: uppercase; }
input[type=number], select { background: var(--bg); border: 1px solid var(--bhi); color: var(--wh); padding: 7px 9px; border-radius: 3px; font-size: 13px; font-family: 'Courier New', monospace; width: 100%; }
input:focus, select:focus { outline: none; border-color: var(--tw); }
button { padding: 9px 14px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: .15s; }
.btw { background: var(--tw); color: #000; width: 100%; } .btw:hover { opacity: .85; }
.bo { background: transparent; border: 1px solid var(--bhi); color: var(--mu); } .bo:hover { color: var(--tx); border-color: var(--tx); }
.sm { padding: 5px 11px; font-size: 11px; width: auto; }
.log { font-size: 11px; color: var(--mu); font-family: 'Courier New', monospace; margin-top: 7px; min-height: 16px; word-break: break-all; }
.hidden { display: none; }
.tw-wrap { overflow-x: auto; max-height: 540px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 7px 8px; color: var(--mu); text-align: left; background: var(--sf2); position: sticky; top: 0; z-index: 2; font-size: 10px; white-space: nowrap; }
td { padding: 6px 8px; border-bottom: 1px solid var(--bd); white-space: nowrap; vertical-align: middle; }
tr:hover { background: var(--sf2); }
.tg { color: var(--gr); } .tr { color: var(--re); } .wh { color: var(--wh); }
.alert-buy { background: var(--ted); border-left: 3px solid var(--te); padding: 10px 12px; margin-bottom: 6px; border-radius: 3px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
.alert-sell { background: var(--red); border-left: 3px solid var(--re); padding: 10px 12px; margin-bottom: 6px; border-radius: 3px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
.chip { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 3px; font-size: 11px; font-family: 'Courier New', monospace; border: 1px solid var(--bd); background: var(--bg); margin: 2px; cursor: pointer; gap: 4px; transition: .12s; }
.chip.on { background: var(--twd); border-color: var(--tw); color: var(--tw); }
.chip.on.us { background: var(--usd); border-color: var(--us); color: var(--us); }
.chip.on.etf { background: var(--bld); border-color: var(--bl); color: var(--bl); }
.cnm { font-size: 9px; opacity: .6; font-family: system-ui, sans-serif; }
.stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.stat-box { background: var(--sf2); border: 1px solid var(--bd); padding: 8px 14px; border-radius: 3px; min-width: 95px; }
.stat-label { font-size: 9px; color: var(--mu); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
.stat-val { font-size: 18px; font-weight: 700; font-family: 'Courier New', monospace; }
.pool-hdr { font-size: 10px; font-weight: 700; margin: 8px 0 4px; text-transform: uppercase; }
.sep { border: none; border-top: 1px solid var(--bd); margin: 10px 0; }
.load-bar { background: var(--bd); border-radius: 2px; height: 3px; margin-top: 6px; overflow: hidden; display: none; }
.load-fill { height: 100%; background: var(--tw); border-radius: 2px; transition: width .2s; }
.code-cell { font-family: 'Courier New', monospace; font-weight: 700; line-height: 1.3; }
.code-nm { font-size: 10px; color: var(--mu); font-weight: 400; font-family: system-ui, sans-serif; display: block; }
</style>
</head>
<body>
<div class="wrap">
<h1>動能交易日誌<span class="tag">v1.1</span></h1>
<div class="sub">V1.8 JSON → 自動偵測訊號 → 組合績效統計 | T 天收盤價基準</div>

<div class="card">
  <div class="ct">1. 載入 V1.8 JSON
    <button class="bo sm" onclick="document.getElementById('fj').click()">⬆ 上傳數據</button>
  </div>
  <input type="file" id="fj" accept=".json" style="display:none" onchange="upJson(this)">
  <div id="loadStat" style="font-size:11px;color:var(--mu)">未載入</div>
  <div class="load-bar" id="loadBar"><div class="load-fill" id="loadFill" style="width:0%"></div></div>
  <div id="stockPool" style="margin-top:10px"></div>
</div>

<div class="card">
  <div class="ct">2. 參數</div>
  <div class="g3">
    <div class="fi">
      <label>Signal Lag</label>
      <select id="pLag">
        <option value="1">T-1</option>
        <option value="2" selected>T-2</option>
      </select>
    </div>
    <div class="fi">
      <label>Pool Mode</label>
      <select id="pPoolMode" onchange="toggleQuotaUI()">
        <option value="large">Large (全局排名)</option>
        <option value="small" selected>Small (分區配額)</option>
      </select>
    </div>
    <div class="fi">
      <label>TNX Spread %</label>
      <input type="number" id="pSpread" value="0.5" step="0.1" min="0">
    </div>
    <div class="fi">
      <label>Corr Threshold</label>
      <input type="number" id="pCorrT" value="0.75" step="0.05" min="0.3" max="1">
    </div>
    <div class="fi" id="qtwWrap">
      <label>台股配額</label>
      <input type="number" id="pQtw" value="2" min="0">
    </div>
    <div class="fi" id="qusWrap">
      <label>美股配額</label>
      <input type="number" id="pQus" value="2" min="0">
    </div>
    <div class="fi" id="qetfWrap">
      <label>ETF 配額</label>
      <input type="number" id="pQetf" value="1" min="0">
    </div>
    <div class="fi" id="largeNWrap" style="display:none">
      <label>Total N</label>
      <input type="number" id="pN" value="5" min="1">
    </div>
  </div>
</div>

<button class="btw" onclick="runAnalysis()" style="margin-bottom:6px">▶ 執行分析</button>
<div class="log" id="runLog"></div>

<div class="card hidden" id="alertCard">
  <div class="ct">
    <span>🔔 最新訊號</span>
    <span id="alertDate" style="color:var(--tw);font-family:'Courier New',monospace;font-size:11px"></span>
  </div>
  <div id="alertContent"></div>
</div>

<div class="card hidden" id="holdCard">
  <div class="ct">📊 目前持倉 <span id="holdDate" style="color:var(--mu);font-size:10px"></span></div>
  <div class="tw-wrap">
    <table><thead><tr>
      <th>代碼 / 名稱</th>
      <th>入場日</th>
      <th>入場 @</th>
      <th>目前 @</th>
      <th>天數</th>
      <th>浮盈%</th>
    </tr></thead>
    <tbody id="holdBody"></tbody></table>
  </div>
</div>

<div class="card hidden" id="trackCard">
  <div class="ct">📋 交易紀錄與統計 <span id="trackCount" style="color:var(--mu);font-size:10px"></span></div>
  <div id="trackSummary"></div>
  <div class="tw-wrap">
    <table><thead><tr>
      <th>代碼 / 名稱</th>
      <th>入場日</th>
      <th>入場 @</th>
      <th>出場日</th>
      <th>出場 @</th>
      <th>天數</th>
      <th>報酬%</th>
      <th>結果</th>
    </tr></thead>
    <tbody id="trackBody"></tbody></table>
  </div>
</div>
</div>

function getStockName(code) { return STOCK_NAMES[code] || ''; }

var ETF_CODES = [
  'SPY','QQQ','IWM','VEU','EFA','EEM','TLT','IEF','GLD','SLV','VNQ','AGG',
  'IWF','IWD','IJH','IJR','SGOV','ITOT','EWT','MCHI','EWY','EWJ','EZU','IVV',
  'BIL','SHV','CSSPX','ACWI','IEMG','IAU','PDBC'
];

var DAILY = {};
var ALL_SIGNALS = [];
var TRACK_RECORDS = [];
var CURRENT_HOLDINGS = [];
var DETECTED_STOCKS = [];

function $(i){ return document.getElementById(i); }
function sl(id,msg,ok){
  var e=$(id); if(!e)return;
  e.textContent=msg;
  e.style.color=ok===true?'var(--gr)':ok===false?'var(--re)':'var(--mu)';
}

function classifyStock(code) {
  if (code.charAt(0) === '^') return 'bench';
  if (ETF_CODES.indexOf(code) !== -1) return 'etf';
  if (/^\d{4}$/.test(code)) return 'tw';
  if (/^\d{4}\.\w/.test(code)) return 'tw'; // Bug 3 Fixed (Regex Escaped)
  return 'us';
}

function colForPool(code) {
  var p = classifyStock(code);
  return p==='tw'?'var(--tw)':p==='etf'?'var(--bl)':'var(--us)';
}

function toggleQuotaUI() {
  var mode = $('pPoolMode').value, isLarge = mode === 'large';
  $('largeNWrap').style.display = isLarge ? '' : 'none';
  ['qtwWrap','qusWrap','qetfWrap'].forEach(function(id){
    var w=$(id); w.style.opacity=isLarge?'0.4':'1';
    var inp=w.querySelector('input'); if(inp) inp.disabled=isLarge;
  });
}

function readParams() {
  var mode=$('pPoolMode').value, qTW=parseInt($('pQtw').value)||2;
  var qUS=parseInt($('pQus').value)||2, qETF=parseInt($('pQetf').value)||1;
  return {
    lag:parseInt($('pLag').value)||2,
    spread:parseFloat($('pSpread').value)||0.5,
    corrT:parseFloat($('pCorrT').value)||0.75,
    poolMode:mode, qTW:qTW, qUS:qUS, qETF:qETF,
    n:mode==='large'?(parseInt($('pN').value)||5):(qTW+qUS+qETF)
  };
}

async function upJson(el) {
  var file=el.files[0]; if(!file)return;
  sl('loadStat','Loading...',null);
  $('loadBar').style.display='block'; $('loadFill').style.width='30%';
  try {
    var text=await file.text(); $('loadFill').style.width='70%';
    var obj=JSON.parse(text);
    if(!obj.DAILY){sl('loadStat','Error: no DAILY field',false);return;}
    DAILY=obj.DAILY||{}; $('loadFill').style.width='100%';
    var keys=Object.keys(DAILY);
    DETECTED_STOCKS=keys.map(function(k){return{c:k,pool:classifyStock(k)};});
    renderStockPool();
    var active=keys.filter(function(k){return k.charAt(0)!=='^';});
    sl('loadStat','Loaded: '+active.length+' stocks',true);
  } catch(e){sl('loadStat','Error: '+e.message,false);}
  setTimeout(function(){$('loadBar').style.display='none';},600);
  el.value='';
}

function renderStockPool() {
  var pools={tw:[],us:[],etf:[],bench:[]};
  DETECTED_STOCKS.forEach(function(s){if(pools[s.pool])pools[s.pool].push(s);});
  var colMap={tw:'var(--tw)',us:'var(--us)',etf:'var(--bl)'};
  var lblMap={tw:'TW',us:'US',etf:'ETF'};
  var html='';
  ['tw','us','etf'].forEach(function(p){
    var list=pools[p]; if(!list||!list.length)return;
    html+='<div class="pool-hdr" style="color:'+colMap[p]+'">'+lblMap[p]+' ('+list.length+')</div>';
    list.forEach(function(s){
      var nm=getStockName(s.c);
      html+='<span class="chip on '+p+'" data-stock="'+s.c+'" data-on="1" onclick="toggleChip(\''+s.c+'\')">'
      +s.c+(nm?'<span class="cnm"> '+nm+'</span>':'')+' </span>';
    });
  });
  $('stockPool').innerHTML=html||'No stocks';
}

function toggleChip(code) {
  var el=document.querySelector('[data-stock="'+code+'"]'); if(!el)return;
  var isOn=el.dataset.on==='1';
  el.dataset.on=isOn?'0':'1'; el.classList.toggle('on',!isOn);
}

function getActiveStocks() {
  return DETECTED_STOCKS.filter(function(s){
    if(s.pool==='bench')return false;
    var el=document.querySelector('[data-stock="'+s.c+'"]');
    return el && el.dataset.on==='1';
  });
}

function getPriceOnDate(bars, dateStr) {
  if(!bars||!bars.length)return null;
  var best=null;
  for(var i=0;i<bars.length;i++){if(bars[i].date<=dateStr)best=bars[i].c;else break;}
  return best;
}

function getPrevWorkDayFromRef(refDaily, dateStr, offset) {
  if(!refDaily||!refDaily.length)return dateStr;
  var idx=-1;
  for(var i=0;i<refDaily.length;i++){if(refDaily[i].date<=dateStr)idx=i;else break;}
  if(idx<0)return refDaily[0].date;
  return refDaily[Math.max(0,idx-offset)].date;
}

function getRebalDates(refDaily) {
  if(!refDaily||!refDaily.length)return[];
  var dates=[],curYM='',lastDate='';
  refDaily.forEach(function(b){
    var ym=b.date.slice(0,7);
    if(ym!==curYM){if(curYM&&lastDate)dates.push(lastDate);curYM=ym;}
    lastDate=b.date;
  });
  if(curYM&&lastDate)dates.push(lastDate);
  return dates;
}

function rawMom(bars, idx) {
  if(idx<240)return null;
  var mom = (bars[idx].c / bars[idx-60].c - 1) * 0.5 + (bars[idx].c / bars[idx-120].c - 1) * 0.3 + (bars[idx].c / bars[idx-240].c - 1) * 0.2;
  return mom;
}

function crossZ(arr, cap) {
  cap=cap||2;
  var vals=arr.filter(v=>v!==null && !isNaN(v));
  if(vals.length<3)return arr.map(v=>v===null?null:0);
  var mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  var std=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length)||1;
  return arr.map(v=>{
    if(v===null||isNaN(v))return null;
    return Math.max(-cap,Math.min(cap,(v-mean)/std));
  });
}

function calcCorr(c1, c2, dateStr) {
  var b1=DAILY[c1], b2=DAILY[c2]; if(!b1||!b2)return 0;
  var WIN=24, i1=-1, i2=-1;
  for(var i=0;i<b1.length;i++){if(b1[i].date<=dateStr)i1=i;else break;}
  for(var i=0;i<b2.length;i++){if(b2[i].date<=dateStr)i2=i;else break;}
  if(i1<WIN*20||i2<WIN*20)return 0;
  var r1=[], r2=[];
  for(var k=0;k<WIN;k++){
    r1.push(b1[i1-k*20].c/b1[i1-(k+1)*20].c-1);
    r2.push(b2[i2-k*20].c/b2[i2-(k+1)*20].c-1);
  }
  var m1=r1.reduce((a,b)=>a+b,0)/r1.length, m2=r2.reduce((a,b)=>a+b,0)/r2.length;
  var num=0, d1=0, d2=0;
  r1.forEach((v,idx)=>{num+=(v-m1)*(r2[idx]-m2);d1+=(v-m1)**2;d2+=(r2[idx]-m2)**2;});
  return num/Math.sqrt((d1*d2)||1);
}

function calcScoresForDate(scoreDate, stocks) {
  var rMs=[], infos=[];
  stocks.forEach(function(s){
    var bars=DAILY[s.c];
    if(!bars||bars.length<250){rMs.push(null);infos.push({s:s,r240:null});return;}
    var idx=-1;
    for(var i=0;i<bars.length;i++){if(bars[i].date<=scoreDate)idx=i;else break;}
    if(idx<240){rMs.push(null);infos.push({s:s,r240:null});return;}
    rMs.push(rawMom(bars,idx));
    infos.push({s:s,r240:bars[idx].c/(bars[idx-240].c||1)-1});
  });
  var zMs=crossZ(rMs,99);
  return infos.map((d,i)=>({s:d.s, score:zMs[i], r240:d.r240}));
}

function selectPortfolio(scores, scoreDate, params) {
  var hurdle=0.04;
  var DEF=['TLT','GLD','SGOV'], ct=params.corrT, sel=[];
  var candidates=scores.filter(r=>r.r240>hurdle && DEF.indexOf(r.s.c)===-1).sort((a,b)=>b.score-a.score);
  
  if(params.poolMode==='large'){
    for(var i=0;i<candidates.length && sel.length<params.n;i++){
      var cand=candidates[i];
      if(sel.every(x=>Math.abs(calcCorr(cand.s.c,x.s.c,scoreDate))<ct))sel.push(cand);
    }
  } else {
    var pools={tw:[],us:[],etf:[]}, quotas={tw:params.qTW,us:params.qUS,etf:params.qETF};
    candidates.forEach(r=>{if(pools[r.s.pool])pools[r.s.pool].push(r);});
    ['us','tw','etf'].forEach(p=>{
      var picked=0, list=pools[p]||[];
      for(var i=0;i<list.length && picked<quotas[p];i++){
        var cand=list[i];
        if(sel.every(x=>Math.abs(calcCorr(cand.s.c,x.s.c,scoreDate))<ct)){sel.push(cand);picked++;}
      }
    });
  }
  return sel.map(r=>r.s.c);
}

function runAnalysis() {
  if(!Object.keys(DAILY).length)return;
  var stocks=getActiveStocks();
  var params=readParams();
  var refKey=DAILY['^TWII']?'^TWII':(DAILY['SPY']?'SPY':Object.keys(DAILY)[0]);
  var refDaily=DAILY[refKey], allM=getRebalDates(refDaily);
  ALL_SIGNALS=[];
  for(var idx=1;idx<allM.length;idx++){
    var sigM=allM[idx], prevM=allM[idx-1];
    var scoreDate=getPrevWorkDayFromRef(refDaily, prevM, params.lag);
    var scores=calcScoresForDate(scoreDate, stocks);
    var portfolio=selectPortfolio(scores, scoreDate, params);
    ALL_SIGNALS.push({date:sigM, codes:portfolio});
  }
  detectEvents(); renderAlerts(); renderHoldings(); renderTrackRecord();
  sl('runLog','分析完成',true);
}

function detectEvents() {
  TRACK_RECORDS=[]; CURRENT_HOLDINGS=[];
  var open={};
  ALL_SIGNALS.forEach((sig, i)=>{
    var prev=i>0?ALL_SIGNALS[i-1].codes:[];
    sig.codes.forEach(c=>{
      if(prev.indexOf(c)===-1 && !open[c]){
        var ep=getPriceOnDate(DAILY[c], sig.date);
        if(ep)open[c]={d:sig.date,p:ep};
      }
    });
    prev.forEach(c=>{
      if(sig.codes.indexOf(c)===-1 && open[c]){
        var xp=getPriceOnDate(DAILY[c], sig.date);
        TRACK_RECORDS.push({code:c, entryDate:open[c].d, entryPrice:open[c].p, exitDate:sig.date, exitPrice:xp,
          holdDays:Math.floor((new Date(sig.date)-new Date(open[c].d))/86400000), ret:xp?xp/open[c].p-1:null});
        delete open[c];
      }
    });
  });
  var lastSig=ALL_SIGNALS[ALL_SIGNALS.length-1];
  lastSig.codes.forEach(c=>{
    if(open[c]){
      var cp=getPriceOnDate(DAILY[c], lastSig.date);
      CURRENT_HOLDINGS.push({code:c, entryDate:open[c].d, entryPrice:open[c].p, currentPrice:cp,
        holdDays:Math.floor((new Date(lastSig.date)-new Date(open[c].d))/86400000), ret:cp?cp/open[c].p-1:null});
    }
  });
}

// Patch 1: Portfolio Stats Engine
function computePortfolioStats() {
  if (ALL_SIGNALS.length < 3) return null;
  var init = 100000, nav = init, peak = init, mdd = 0, periodRets = [];
  for (var i = 0; i < ALL_SIGNALS.length - 1; i++) {
    var codes = ALL_SIGNALS[i].codes;
    var d0 = ALL_SIGNALS[i].date, d1 = ALL_SIGNALS[i+1].date;
    var ret = 0, cnt = 0;
    codes.forEach(function(c) {
      var p0 = getPriceOnDate(DAILY[c], d0), p1 = getPriceOnDate(DAILY[c], d1);
      if (p0 && p1 && p0 > 0) { ret += p1/p0 - 1; cnt++; }
    });
    var pRet = cnt > 0 ? ret / cnt : 0;
    periodRets.push(pRet);
    nav *= (1 + pRet);
    if (nav > peak) peak = nav;
    var dd = (nav - peak) / peak;
    if (dd < mdd) mdd = dd;
  }
  var yrs = periodRets.length / 12;
  var cagr = yrs > 0 ? Math.pow(nav / init, 1/yrs) - 1 : 0;
  var mean = periodRets.reduce(function(a,b){return a+b;},0) / periodRets.length;
  var std = Math.sqrt(periodRets.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/periodRets.length) * Math.sqrt(12);
  var sharpe = std > 0 ? (cagr - 0.015) / std : 0;
  return {cagr:cagr, mdd:mdd, sharpe:sharpe, months:periodRets.length};
}

function renderAlerts() {
  var n=ALL_SIGNALS.length;if(n<1)return;
  var lastSig=ALL_SIGNALS[n-1], prevSig=n>1?ALL_SIGNALS[n-2]:{codes:[]};
  var entries=lastSig.codes.filter(c=>prevSig.codes.indexOf(c)===-1);
  var exits=prevSig.codes.filter(c=>lastSig.codes.indexOf(c)===-1);
  $('alertCard').classList.remove('hidden');$('alertDate').textContent=lastSig.date;
  var html='';
  entries.forEach(c=>{
    var ep=getPriceOnDate(DAILY[c], lastSig.date);
    html+='<div class="alert-buy"><span style="color:var(--te)">BUY</span> <span class="mono" style="font-weight:700">'+c+' '+getStockName(c)+'</span> @ '+(ep?ep.toFixed(2):'--')+'</div>';
  });
  // Bug 2 Fixed: Sell alert shows return
  exits.forEach(function(c) {
    var rec = null;
    for (var i = TRACK_RECORDS.length - 1; i >= 0; i--) {
        if (TRACK_RECORDS[i].code === c && TRACK_RECORDS[i].exitDate === lastSig.date) { rec = TRACK_RECORDS[i]; break; }
    }
    var retStr = (rec && rec.ret !== null) ? ' | ' + (rec.ret >= 0 ? '+' : '') + (rec.ret * 100).toFixed(2) + '%' : '';
    html += '<div class="alert-sell"><span style="color:var(--re)">SELL</span> <span class="mono" style="font-weight:700">' + c + ' ' + getStockName(c) + '</span>' + retStr + '</div>';
  });
  $('alertContent').innerHTML=html||'<div style="color:var(--mu);font-size:12px">此期間無部位變動</div>';
}

function renderHoldings() {
  if(!CURRENT_HOLDINGS.length)return;
  $('holdCard').classList.remove('hidden');$('holdDate').textContent='as of '+ALL_SIGNALS[ALL_SIGNALS.length-1].date;
  var html='';
  CURRENT_HOLDINGS.sort((a,b)=>(b.ret||0)-(a.ret||0)).forEach(h=>{
    var rc=h.ret>=0?'var(--gr)':'var(--re)';
    html+='<tr><td><span class="code-cell" style="color:'+colForPool(h.code)+'">'+h.code+'<span class="code-nm">'+getStockName(h.code)+'</span></span></td>'
    +'<td class="mono">'+h.entryDate+'</td><td class="mono">'+h.entryPrice.toFixed(2)+'</td><td class="mono">'+(h.currentPrice?h.currentPrice.toFixed(2):'--')+'</td>'
    +'<td class="mono">'+h.holdDays+'</td><td class="mono" style="color:'+rc+'">'+(h.ret*100).toFixed(2)+'%</td></tr>';
  });
  $('holdBody').innerHTML=html;
}

// Patch 2: Updated Track Record
function renderTrackRecord() {
    if (!TRACK_RECORDS.length) { $('trackCard').classList.add('hidden'); return; }
    $('trackCard').classList.remove('hidden');
    $('trackCount').textContent = TRACK_RECORDS.length + ' trades'; // Bug 1 Fixed

    var ps = computePortfolioStats();
    var psHtml = '';
    if (ps) {
        var cc = ps.cagr >= 0 ? 'var(--gr)' : 'var(--re)';
        var sc = ps.sharpe >= 1 ? 'var(--gr)' : ps.sharpe >= 0 ? 'var(--ye)' : 'var(--re)';
        psHtml = '<div style="font-size:10px;color:var(--mu);font-weight:700;margin-bottom:4px">PORTFOLIO (EW monthly)</div>'
            + '<div class="stats-row">'
            + '<div class="stat-box"><div class="stat-label">CAGR</div><div class="stat-val" style="color:'+cc+'">'+(ps.cagr>=0?'+':'')+(ps.cagr*100).toFixed(1)+'%</div></div>'
            + '<div class="stat-box"><div class="stat-label">Max DD</div><div class="stat-val tr">'+(ps.mdd*100).toFixed(1)+'%</div></div>'
            + '<div class="stat-box"><div class="stat-label">Sharpe</div><div class="stat-val" style="color:'+sc+'">'+ps.sharpe.toFixed(2)+'</div></div>'
            + '<div class="stat-box"><div class="stat-label">Months</div><div class="stat-val wh">'+ps.months+'</div></div>'
            + '</div>';
    }

    var valid = TRACK_RECORDS.filter(function(t){return t.ret !== null;});
    var wins = valid.filter(function(t){return t.ret > 0;});
    var avgRet = valid.length ? valid.reduce(function(a,t){return a+t.ret;},0)/valid.length : 0;
    var avgDays = TRACK_RECORDS.reduce(function(a,t){return a+t.holdDays;},0)/TRACK_RECORDS.length;
    var winRate = valid.length ? wins.length/valid.length : 0;
    var wrc = winRate >= 0.5 ? 'var(--gr)' : 'var(--re)';
    var arc = avgRet >= 0 ? 'var(--gr)' : 'var(--re)';

    var tradeHtml = '<div style="font-size:10px;color:var(--mu);font-weight:700;margin:8px 0 4px">TRADE LOG</div>'
        + '<div class="stats-row">'
        + '<div class="stat-box"><div class="stat-label">Trades</div><div class="stat-val wh">'+TRACK_RECORDS.length+'</div></div>'
        + '<div class="stat-box"><div class="stat-label">Win Rate</div><div class="stat-val" style="color:'+wrc+'">'+(winRate*100).toFixed(0)+'%</div></div>'
        + '<div class="stat-box"><div class="stat-label">Avg Return</div><div class="stat-val" style="color:'+arc+'">'+(avgRet>=0?'+':'')+(avgRet*100).toFixed(1)+'%</div></div>'
        + '<div class="stat-box"><div class="stat-label">Avg Hold</div><div class="stat-val wh">'+Math.round(avgDays)+'d</div></div>'
        + '</div>';

    $('trackSummary').innerHTML = psHtml + tradeHtml;

    var html = '';
    valid.slice().reverse().forEach(function(t) {
        var rc = t.ret >= 0 ? 'var(--gr)' : 'var(--re)';
        html += '<tr><td><span class="code-cell" style="color:'+colForPool(t.code)+'">'+t.code+'<span class="code-nm">'+getStockName(t.code)+'</span></span></td>'
        +'<td class="mono">'+t.entryDate+'</td><td class="mono">'+t.entryPrice.toFixed(2)+'</td><td class="mono">'+t.exitDate+'</td><td class="mono">'+(t.exitPrice?t.exitPrice.toFixed(2):'--')+'</td>'
        +'<td class="mono">'+t.holdDays+'d</td><td class="mono" style="color:'+rc+'">'+(t.ret*100).toFixed(2)+'%</td><td>'+(t.ret>0?'WIN':'LOSS')+'</td></tr>';
    });
    $('trackBody').innerHTML = html;
}
