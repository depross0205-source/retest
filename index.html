<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Fearless Console v2.5 - Full Edition</title>
    <style>
        :root { --bg: #0f1113; --card: #1a1d21; --text: #e8e9eb; --win: #00e676; --lose: #ff5252; --flat: #ffd740; --accent: #2979ff; }
        body { background: var(--bg); color: var(--text); font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 25px; line-height: 1.6; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 3px solid #333; transition: 0.3s; }
        .stat-card h3 { margin: 5px 0; font-size: 1.5rem; color: var(--accent); }
        .control-panel { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .group-box { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn-group button { padding: 6px 12px; cursor: pointer; border: 1px solid var(--accent); border-radius: 4px; background: transparent; color: var(--accent); margin-right: 8px; margin-bottom: 5px; font-size: 13px; }
        button:hover { background: var(--accent); color: white; }
        .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; }
        .ticker-item { background: #25292e; padding: 8px; border-radius: 4px; font-size: 14px; }
        .settings { display: flex; gap: 20px; align-items: center; margin: 20px 0; background: #25292e; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th { background: #25292e; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; }
        .audit-row { background: rgba(255, 82, 82, 0.15) !important; font-weight: bold; }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-win { background: var(--win); color: #000; }
        .badge-lose { background: var(--lose); color: #fff; }
        .badge-flat { background: var(--flat); color: #000; }
    </style>
</head>
<body>

    <header>
        <h1>Fearless Console <span style="font-size: 14px; color: #888;">定量回測系統 v2.5</span></h1>
    </header>

    <div class="control-panel">
        <div class="group-box">
            <strong>快速篩選：</strong>
            <div class="btn-group" style="margin-top:10px;">
                <button onclick="toggleGroup('us_idx', true)">美股指數 (VOO/QQQ...)</button>
                <button onclick="toggleGroup('us_sec', true)">美股產業 (核能/機器人...)</button>
                <button onclick="toggleGroup('metals', true)">貴金屬 (金/銀)</button>
                <button onclick="toggleGroup('tw_core', true)">台股權值/核心</button>
                <button style="border-color:#888; color:#888;" onclick="toggleGroup('all', false)">全部清除</button>
            </div>
        </div>

        <div class="settings">
            <div><strong>起始資金 (FV)：</strong> $10,000</div>
            <div>
                <strong>風險控管：</strong>
                <label><input type="checkbox" id="stopLossEnabled" checked> 啟用硬停損</label>
                <input type="number" id="stopLossValue" value="10" style="width:50px; background:#121214; color:white; border:1px solid #444;"> %
            </div>
        </div>
        
        <div class="ticker-grid" id="tickerContainer"></div>
    </div>

    <div class="dashboard" id="statsBoard"></div>

    <h3>交易明細回溯 (含 2σ 異常審核)</h3>
    <table id="tradeTable">
        <thead>
            <tr>
                <th>出場日</th>
                <th>報酬率</th>
                <th>期末價值 (FV)</th>
                <th>分類</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="tradeBody"></tbody>
    </table>

<script>
    // 完整股號名單定義
    const STOCKS = [
        { id: 'VOO', name: '標普500', group: 'us_idx' },
        { id: 'QQQ', name: '納斯達克', group: 'us_idx' },
        { id: 'DIA', name: '道瓊工業', group: 'us_idx' },
        { id: 'NLR', name: '核能電能', group: 'us_sec' },
        { id: 'BOTZ', name: '機器人 AI', group: 'us_sec' },
        { id: 'SOXX', name: '半導體', group: 'us_sec' },
        { id: 'PHYS', name: '實體黃金', group: 'metals' },
        { id: 'PSLV', name: '實體白銀', group: 'metals' },
        { id: '2330', name: '台積電', group: 'tw_core' },
        { id: '0050', name: '元大台灣50', group: 'tw_core' },
        { id: '6728', name: '上洋', group: 'tw_core' },
        { id: '2409', name: '友達', group: 'tw_core' },
        { id: '0056', name: '元大高股息', group: 'tw_core' },
        { id: '00878', name: '國泰永續高股息', group: 'tw_core' }
    ];

    const START_CASH = 10000;

    function initUI() {
        const container = document.getElementById('tickerContainer');
        STOCKS.forEach(s => {
            const div = document.createElement('div');
            div.className = 'ticker-item';
            div.innerHTML = `
                <input type="checkbox" class="ticker-chk" value="${s.id}" data-group="${s.group}" checked>
                <span title="${s.name}">${s.id}</span>
            `;
            container.appendChild(div);
        });
    }

    function toggleGroup(group, state) {
        document.querySelectorAll('.ticker-chk').forEach(chk => {
            if (group === 'all' || chk.dataset.group === group) chk.checked = state;
        });
    }

    // 核心計算邏輯
    function calculate(rawTrades) {
        let balance = START_CASH;
        const stopLossLimit = parseFloat(document.getElementById('stopLossValue').value) / 100;
        const isStopLossOn = document.getElementById('stopLossEnabled').checked;

        // 計算統計基礎
        const returns = rawTrades.map(t => t.ret);
        const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
        const std = Math.sqrt(returns.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / returns.length);
        
        // Sharpe 修正 (日頻年化係數 sqrt(252))
        const sharpe = (mean / std) * Math.sqrt(252);

        let wins = [], loses = [], flatCount = 0;

        const processed = rawTrades.map(t => {
            let actualRet = t.ret;
            
            // 停損邏輯觸發
            if (isStopLossOn && actualRet < -stopLossLimit) {
                actualRet = -stopLossLimit;
            }

            balance *= (1 + actualRet);

            // 分類邏輯 (+-0.5% 定義)
            let cat = "FLAT";
            if (actualRet > 0.005) { cat = "WIN"; wins.push(actualRet); }
            else if (actualRet < -0.005) { cat = "LOSE"; loses.push(actualRet); }
            else { flatCount++; }

            // 2σ 異常審核
            const isAnomaly = Math.abs(actualRet - mean) > 2 * std;

            return { ...t, ret: actualRet, fv: balance, cat, isAnomaly };
        });

        updateUI({
            sharpe: sharpe.toFixed(2),
            fv: balance.toLocaleString(undefined, {maximumFractionDigits:0}),
            avgWin: (wins.length ? (wins.reduce((a,b)=>a+b)/wins.length*100).toFixed(2) : "0") + "%",
            avgLose: (loses.length ? (loses.reduce((a,b)=>a+b)/loses.length*100).toFixed(2) : "0") + "%",
            days: rawTrades.length,
            flatCount
        }, processed);
    }

    function updateUI(s, trades) {
        document.getElementById('statsBoard').innerHTML = `
            <div class="stat-card"><h3>${s.sharpe}</h3><p>Sharpe (252d)</p></div>
            <div class="stat-card"><h3>${s.days}</h3><p>交易天數</p></div>
            <div class="stat-card"><h3>$${s.fv}</h3><p>期末價值 (FV)</p></div>
            <div class="stat-card"><h3>${s.avgWin}</h3><p>Avg Win</p></div>
            <div class="stat-card"><h3>${s.avgLose}</h3><p>Avg Lose</p></div>
            <div class="stat-card"><h3>${s.flatCount}</h3><p>Flat 筆數</p></div>
        `;

        document.getElementById('tradeBody').innerHTML = trades.map(t => `
            <tr class="${t.isAnomaly ? 'audit-row' : ''}">
                <td>${t.date}</td>
                <td style="color:${t.ret >=0 ? 'var(--win)' : 'var(--lose)'}">${(t.ret * 100).toFixed(2)}%</td>
                <td>$${t.fv.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                <td><span class="badge badge-${t.cat.toLowerCase()}">${t.cat}</span></td>
                <td>${t.isAnomaly ? '⚠️ 2σ 異常' : '正常'}</td>
            </tr>
        `).join('');
    }

    // 啟動
    initUI();
    
    // 模擬啟動數據
    const demoData = [
        { date: '2026-03-02', ret: 0.0978 },
        { date: '2026-02-26', ret: 0.0028 },
        { date: '2026-02-25', ret: 0.0026 },
        { date: '2026-02-24', ret: 0.0931 },
        { date: '2026-01-10', ret: -0.1500 }
    ];
    calculate(demoData);

</script>
</body>
</html>
